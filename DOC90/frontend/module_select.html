<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文档解析AI助手 - 模板模式</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
  <link rel="stylesheet" href="./src/style.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#2563eb',
            secondary: '#0d9488',
            dark: '#1e293b',
            light: '#f8fafc',
            upload: '#ef4444'
          }
        }
      }
    }
  </script>
</head>

<body class="bg-gray-50 font-sans">

  <div class="flex h-screen overflow-hidden">
    <!-- 主内容 -->
    <div class="flex-1 flex flex-col overflow-hidden relative">
      <!-- 导航栏：返回按钮放左上角 -->
      <header class="main-header" id="main-header">
        <div class="py-4 px-6 flex items-center justify-between">
          <div class="flex items-center space-x-4">
            <!-- 返回按钮  左上角 -->
            <button id="back-btn" class="text-gray-600 hover:text-primary transition-colors flex items-center">
              <i class="fa fa-arrow-left mr-1"></i>

              <a href="module.html" class="ml-1 text-primary hover:text-primary/80 transition-colors">返回</a>

            </button>
          </div>
          <div class="flex items-center space-x-2">
            <i class="fa fa-th-large text-primary text-2xl"></i>
            <h1 class="text-xl font-bold text-gray-800">模板解析AI助手</h1>
          </div>
          <div class="flex items-center space-x-4">
            <button id="history-btn" class="text-gray-600 hover:text-primary transition-colors">
              <i class="fa fa-history text-lg"></i>
            </button>
          </div>
        </div>
      </header>

      <div class="main-content">
        <main class="flex-1 overflow-y-auto p-6 space-y-6 bg-gray-50">
          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 模板卡片1 -->
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer">
              <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
                  <i class="fa fa-file-text-o text-xl"></i>
                </div>
                <h3 class="ml-3 font-bold text-lg text-gray-800">合同解析模板</h3>
              </div>
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                快速解析各类合同文档，提取关键条款、签约方、有效期等核心信息
              </p>
              <button
                class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
                使用模板
              </button>
            </div>

            <!-- 模板卡片2 -->
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer">
              <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-secondary/10 flex items-center justify-center text-secondary">
                  <i class="fa fa-bar-chart text-xl"></i>
                </div>
                <h3 class="ml-3 font-bold text-lg text-gray-800">报表分析模板</h3>
              </div>
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                解析Excel/CSV报表，自动生成数据分析结论、趋势图和关键指标总结
              </p>
              <button
                class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
                使用模板
              </button>
            </div>

            <!-- 模板卡片3 -->
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer">
              <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-purple-100 flex items-center justify-center text-purple-600">
                  <i class="fa fa-list-alt text-xl"></i>
                </div>
                <h3 class="ml-3 font-bold text-lg text-gray-800">会议纪要模板</h3>
              </div>
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                解析会议录音/文字纪要，提取决策事项、待办任务、参会人员等信息
              </p>
              <button
                class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
                使用模板
              </button>
            </div>

            <!-- 模板卡片4 -->
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer">
              <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center text-green-600">
                  <i class="fa fa-book text-xl"></i>
                </div>
                <h3 class="ml-3 font-bold text-lg text-gray-800">文献摘要模板</h3>
              </div>
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                解析学术文献、论文，自动生成摘要、关键词提取和核心观点总结
              </p>
              <button
                class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
                使用模板
              </button>
            </div>

            <!-- 模板卡片5 -->
            <div class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer">
              <div class="flex items-center mb-4">
                <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
                  <i class="fa fa-user text-xl"></i>
                </div>
                <h3 class="ml-3 font-bold text-lg text-gray-800">简历解析模板</h3>
              </div>
              <p class="text-gray-600 text-sm mb-4 line-clamp-2">
                解析简历文档，提取个人信息、工作经历、技能证书等结构化数据
              </p>
              <button
                class="w-full py-2 px-4 bg-primary text-white rounded-lg hover:bg-primary/90 transition-colors text-sm">
                使用模板
              </button>
            </div>

            <!-- 自定义模板 → 点击跳转到 module_new.html -->
            <div id="custom-template-card"
              class="bg-white rounded-xl shadow-sm hover:shadow-md transition-shadow p-6 cursor-pointer border-2 border-dashed border-gray-300 flex flex-col items-center justify-center h-full">
              <div class="w-12 h-12 rounded-full bg-gray-100 flex items-center justify-center text-gray-400 mb-3">
                <i class="fa fa-plus text-2xl"></i>
              </div>
              <h3 class="font-medium text-gray-700 mb-1">自定义模板</h3>
              <p class="text-gray-500 text-xs text-center">创建个性化解析模板</p>
            </div>
          </div>
        </main>

        <footer class="bg-white border-t border-gray-200 p-4">
          <div class="flex justify-between items-center">
            <button class="flex items-center text-primary hover:text-primary/80 transition-colors">
              <i class="fa fa-upload mr-2"></i>
              <span>批量导入模板</span>
            </button>
            <button class="flex items-center text-gray-600 hover:text-gray-800 transition-colors">
              <i class="fa fa-download mr-2"></i>
              <span>导出模板配置</span>
            </button>
            <button class="flex items-center text-red-500 hover:text-red-600 transition-colors">
              <i class="fa fa-trash mr-2"></i>
              <span>清空模板缓存</span>
            </button>
          </div>
        </footer>
      </div>
    </div>

    <!-- 历史记录侧边栏 → 移到右边 -->
    <div id="history-sidebar" class="w-0 bg-white shadow-lg transition-all duration-300 overflow-hidden h-full">
      <div class="p-4 border-b border-gray-200 flex justify-between items-center">
        <h2 class="font-bold text-lg text-gray-800">模板使用记录</h2>
        <button id="close-history" class="text-gray-500 hover:text-gray-800">
          <i class="fa fa-times"></i>
        </button>
      </div>
      <div id="history-list" class="p-4 h-[calc(100%-60px)] overflow-y-auto space-y-3">
        <div class="text-gray-500 text-center py-4">暂无模板使用记录</div>
      </div>
    </div>
  </div>

  <script>
    // 获取元素
    const backBtn = document.getElementById('back-btn');
    const historyBtn = document.getElementById('history-btn');
    const historySidebar = document.getElementById('history-sidebar');
    const closeHistory = document.getElementById('close-history');
    const historyList = document.getElementById('history-list');
    const customTemplateCard = document.getElementById('custom-template-card');

    let templateHistory = [];

    // 返回上一页
    backBtn.addEventListener('click', () => {
      window.history.back();
    });

    // 打开历史侧边栏
    historyBtn.addEventListener('click', () => {
      historySidebar.classList.remove('w-0');
      historySidebar.classList.add('w-80');
    });

    // 关闭历史侧边栏
    closeHistory.addEventListener('click', () => {
      historySidebar.classList.remove('w-80');
      historySidebar.classList.add('w-0');
    });

    // 自定义模板卡片跳转
    customTemplateCard.addEventListener('click', () => {
      window.location.href = 'module_new.html';
    });

    // 初始化历史记录
    function renderTemplateHistory() {
      if (templateHistory.length === 0) {
        historyList.innerHTML = '<div class="text-gray-500 text-center py-4">暂无模板使用记录</div>';
        return;
      }
    }
    renderTemplateHistory();
  </script>
</body>

</html>
