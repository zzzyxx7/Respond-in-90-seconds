services:
  mysql:
    image: 'mysql:8.0'
    environment:
      - 'MYSQL_DATABASE=mydatabase'
      - 'MYSQL_PASSWORD=secret'
      - 'MYSQL_ROOT_PASSWORD=verysecret'
      - 'MYSQL_USER=myuser'
    ports:
      - '3306:3306'

  redis:
    image: 'redis:7'
    ports:
      - '6379:6379'

  rabbitmq:
    image: 'rabbitmq:3-management'
    environment:
      - 'RABBITMQ_DEFAULT_USER=zkj'
      - 'RABBITMQ_DEFAULT_PASS=123456'
      - 'RABBITMQ_DEFAULT_VHOST=/'
    ports:
      - '5672:5672'
      - '15672:15672'
